{% extends 'base.html' %}

{% block page_title %}Modifier le Dossier Patient{% endblock %}

{% block content %}
<div class="card p-5 mx-auto shadow-sm" style="max-width: 700px; border-radius: 16px;">
    <div class="mb-4">
        <h4 class="fw-bold" style="color: #0f172a;">Modifier le Dossier</h4>
        <p class="text-muted">Mise à jour des informations cliniques de <strong>{{ patient.name }}</strong>.</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label fw-semibold text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Nom Complet</label>
            <input type="text" name="name" value="{{ patient.name }}" class="form-control" style="border-radius: 8px;" required>
        </div>
        <div class="row">
            <div class="col-md-4 mb-4">
                <label class="form-label fw-semibold text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Âge</label>
                <input type="number" name="age" value="{{ patient.age }}" class="form-control" style="border-radius: 8px;" required>
            </div>
            <div class="col-md-4 mb-4">
                <label class="form-label fw-semibold text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Sexe</label>
                <select name="gender" class="form-select" style="border-radius: 8px;">
                    <option value="M" {% if patient.gender == 'M' %}selected{% endif %}>Homme</option>
                    <option value="F" {% if patient.gender == 'F' %}selected{% endif %}>Femme</option>
                    <option value="O" {% if patient.gender == 'O' %}selected{% endif %}>Autre</option>
                </select>
            </div>
            <div class="col-md-4 mb-4">
                <label class="form-label fw-semibold text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Diagnostic</label>
                <select name="diagnosis" class="form-select" style="border-radius: 8px;">
                    <option value="CN" {% if patient.diagnosis == 'CN' %}selected{% endif %}>CN — Normal</option>
                    <option value="MCI" {% if patient.diagnosis == 'MCI' %}selected{% endif %}>MCI — Précoce</option>
                    <option value="AD" {% if patient.diagnosis == 'AD' %}selected{% endif %}>AD — Alzheimer</option>
                </select>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold text-muted" style="font-size: 0.8rem; text-transform: uppercase;">Notes Cliniques</label>
            <textarea name="clinical_notes" class="form-control" rows="4" style="border-radius: 8px;">{{ patient.clinical_notes }}</textarea>
        </div>
        <div class="d-flex justify-content-between align-items-center">
            <a href="{% url 'patients:detail' patient.pk %}" class="btn btn-light border" style="border-radius: 8px;">Annuler</a>
            <div class="d-flex gap-2">
                <a href="{% url 'patients:delete' patient.pk %}" class="btn btn-outline-danger" style="border-radius: 8px;">
                    <i class="fa-solid fa-trash me-1"></i>Supprimer
                </a>
                <button type="submit" class="btn btn-primary px-4" style="border-radius: 8px; font-weight: 600;">
                    <i class="fa-solid fa-save me-1"></i>Enregistrer
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
