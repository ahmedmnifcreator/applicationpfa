{% extends 'base.html' %}

{% block page_title %}Nouveau Rendez-vous{% endblock %}

{% block content %}
<div class="card p-5 mx-auto border-0" style="max-width: 600px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);">
    <div class="mb-4">
        <h4 class="fw-bold" style="color: #0f172a;"><i class="fa-solid fa-calendar-plus me-2 text-primary"></i>Nouveau Rendez-vous</h4>
        <p class="text-muted">Planifier une consultation, IRM ou évaluation pour un patient.</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label fw-semibold text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">Patient</label>
            <select name="patient" class="form-select" style="border-radius: 8px; border-color: #e2e8f0;" required>
                <option value="">-- Sélectionner un patient --</option>
                {% for p in patients %}
                <option value="{{ p.pk }}">{{ p.name }} — {{ p.diagnosis }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="row g-3 mb-4">
            <div class="col-7">
                <label class="form-label fw-semibold text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">Date</label>
                <input type="date" name="date" class="form-control" style="border-radius: 8px; border-color: #e2e8f0;" required>
            </div>
            <div class="col-5">
                <label class="form-label fw-semibold text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">Heure</label>
                <input type="time" name="time" class="form-control" style="border-radius: 8px; border-color: #e2e8f0;">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">Type de Rendez-vous</label>
            <select name="appointment_type" class="form-select" style="border-radius: 8px; border-color: #e2e8f0;">
                <option value="Consultation">🔵 Consultation</option>
                <option value="IRM">🔴 IRM</option>
                <option value="Evaluation">🟢 Évaluation</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">Notes (Optionnel)</label>
            <textarea name="notes" class="form-control" rows="3" style="border-radius: 8px; border-color: #e2e8f0;" placeholder="Informations complémentaires..."></textarea>
        </div>
        <div class="d-flex justify-content-between">
            <a href="{% url 'dashboard:index' %}" class="btn btn-light border" style="border-radius: 8px;">Annuler</a>
            <button type="submit" class="btn btn-primary px-4" style="border-radius: 8px; font-weight: 600;">
                <i class="fa-solid fa-calendar-check me-1"></i>Confirmer le Rendez-vous
            </button>
        </div>
    </form>
</div>
{% endblock %}
