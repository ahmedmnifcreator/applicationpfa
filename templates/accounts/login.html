{% extends 'base.html' %}

{% block auth_content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4 shadow-lg border-0" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <i class="fa-solid fa-brain fs-1" style="color: var(--primary-color);"></i>
            <h3 class="mt-2 text-dark font-weight-bold">NeuroTrack</h3>
            <p class="text-muted">Doctor Portal</p>
        </div>
        <form method="post" action="{% url 'accounts:login' %}">
            {% csrf_token %}
            {% if form.errors %}
                <div class="alert alert-danger p-2">Invalid credentials.</div>
            {% endif %}
            <div class="mb-3">
                <label class="form-label text-muted">Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn text-white w-100 py-2" style="background-color: var(--primary-color);">Secure Login</button>
        </form>
    </div>
</div>
{% endblock %}
